<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>空室クリーニング完全マスター Web</title>
    <meta name="description" content="空室クリーニング教材を場所、汚れ、素材、洗剤、道具から検索するWebアプリ">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">清</span>
        <div>
          <strong>空室クリーニング完全マスター</strong>
          <small>Version2 Web Foundation</small>
        </div>
      </div>
      <a class="header-link" href="../manuals/house-cleaning-manual/README.md">README</a>
    </header>

    <main class="app-shell">
      <section class="search-panel" aria-label="教材検索">
        <div class="search-heading">
          <p>教材検索</p>
          <h1>場所、汚れ、素材から必要な手順へ</h1>
        </div>

        <label class="search-box">
          <span>キーワード</span>
          <input id="keywordInput" type="search" placeholder="例: 水垢 / エアコン ホコリ / サビ">
        </label>

        <div class="filter-grid">
          <label>
            <span>場所</span>
            <select id="areaFilter"></select>
          </label>
          <label>
            <span>汚れ</span>
            <select id="dirtFilter"></select>
          </label>
          <label>
            <span>素材</span>
            <select id="materialFilter"></select>
          </label>
          <label>
            <span>洗剤</span>
            <select id="chemicalFilter"></select>
          </label>
          <label>
            <span>道具</span>
            <select id="toolFilter"></select>
          </label>
        </div>

        <div class="quick-filters" aria-label="クイック検索">
          <button type="button" data-quick="水垢">水垢</button>
          <button type="button" data-quick="カビ">カビ</button>
          <button type="button" data-quick="サビ">サビ</button>
          <button type="button" data-quick="壁紙">壁紙</button>
          <button type="button" data-quick="エアコン">エアコン</button>
        </div>

        <div id="activeFilterChips" class="active-filter-chips" aria-label="検索中の条件"></div>
      </section>

      <section class="results-panel" aria-label="検索結果">
        <div class="results-toolbar">
          <div>
            <p id="resultCount">読み込み中</p>
            <h2>検索結果</h2>
          </div>
          <button type="button" id="resetButton">リセット</button>
        </div>
        <div id="resultList" class="result-list"></div>
      </section>

      <aside class="detail-panel" id="detailPanel" aria-label="詳細">
        <div class="empty-detail">
          <h2>教材を選択</h2>
          <p>検索結果から章を選ぶと、必要な道具、洗剤、手順、注意事項、PDFリンクを表示します。</p>
        </div>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
