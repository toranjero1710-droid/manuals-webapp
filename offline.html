<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>オフライン - 空室クリーニング完全マスター</title>
    <meta name="theme-color" content="#0f766e">
    <style>
      body {
        margin: 0;
        background: #f6f7f9;
        color: #17212b;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(100%, 440px);
        border: 1px solid #d8e0e7;
        border-radius: 8px;
        background: #fff;
        padding: 22px;
      }

      h1 {
        margin: 0 0 8px;
        color: #115e59;
        font-size: 22px;
      }

      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>オフラインです</h1>
        <p>オフラインです。接続後に再読み込みしてください。</p>
      </section>
    </main>
  </body>
</html>
